services:
  agent-space:
    build: .
    ports:
      - "18790:18790"
    volumes:
      - ${OPENCLAW_HOME:-~/.openclaw}:/root/.openclaw:ro
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
