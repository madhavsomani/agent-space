services:
  agent-space:
    build: .
    ports:
      - "18790:18790"
    environment:
      - PORT=18790
      - BIND_HOST=0.0.0.0
    volumes:
      - ${OPENCLAW_HOME:-${HOME}/.openclaw}:/root/.openclaw:ro
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
