services:
  agent-space:
    build: .
    ports:
      - "18790:18790"
    environment:
      - BIND_HOST=0.0.0.0
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    # Uncomment to mount live data or custom config:
    # volumes:
    #   - ~/.openclaw/agents:/root/.openclaw/agents:ro
    #   - ./config.json:/app/config.json:ro

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  qdrant_data:
