version: "3.8"

services:
  agent-space:
    build: .
    ports:
      - "18790:18790"
    volumes:
      - ${OPENCLAW_DIR:-~/.openclaw}:/root/.openclaw:ro
      - ./config.json:/app/config.json:ro
    environment:
      - BIND_HOST=0.0.0.0
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant-data:
