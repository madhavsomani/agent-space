name: Secret Scan
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Scan for secrets & personal data
        run: |
          echo "🔍 Scanning for secrets and personal data..."
          FOUND=0
          
          # Pattern scan for common secrets
          for pattern in "sk-" "ghp_" "gho_" "Bearer " "API_KEY=" "apiKey:" "token:" "password:" "@gmail.com" "@outlook.com"; do
            if grep -rn "$pattern" --include="*.js" --include="*.html" --include="*.json" --include="*.md" . | grep -v node_modules | grep -v ".github" | grep -v "config.example"; then
              echo "❌ Found potential secret pattern: $pattern"
              FOUND=1
            fi
          done
          
          # Check for hardcoded IDs (Telegram-style numeric IDs)
          if grep -rn '[0-9]\{10,\}' --include="*.js" --include="*.html" . | grep -v node_modules | grep -v "Date.now\|setTimeout\|setInterval\|Math\|1000\|60000\|86400\|3600\|timestamp\|\.length\|parseInt\|Number\|0x\|port\|width\|height\|size\|max\|min\|cache\|TTL\|interval\|timeout\|delay\|px\|rem\|em\|vh\|vw\|rgb\|hsl" | head -20; then
              echo "⚠️ Found hardcoded numeric IDs — review above"
          fi
          
          # Check for home directory paths
          if grep -rn "/Users/\|/home/" --include="*.js" --include="*.html" . | grep -v node_modules | grep -v "process.env.HOME\|os.homedir"; then
            echo "❌ Found hardcoded home directory paths"
            FOUND=1
          fi
          
          if [ $FOUND -eq 1 ]; then
            echo "❌ Secret scan FAILED — fix the above issues"
            exit 1
          fi
          
          echo "✅ No secrets or personal data found"
